<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .al-mono { font-family: 'SF Mono','Fira Code','Consolas',monospace; }
    .al-disp { font-family: 'Segoe UI','Helvetica Neue',Arial,sans-serif; font-weight: 800; }
    .al-card { fill: rgba(5,5,10,0.03); stroke: rgba(5,5,10,0.10); stroke-width:1; }
    .al-dim { fill:#6B6B76; }
    .al-bright { fill:#101014; }
    @keyframes al-float { 0% { transform: translateY(0px); opacity:.15;} 50% { opacity:.5;} 100% { transform: translateY(-260px); opacity:0;} }
    @keyframes al-flicker { 0%,19%,21%,23%,54%,56%,100% { opacity:1;} 20%,22%,55% { opacity:.4;} }
    @keyframes al-blink { 0%,49% {opacity:1;} 50%,100% {opacity:0;} }
    .al-p { animation: al-float linear infinite; }
    .al-neon { animation: al-flicker 5s infinite; }
    .al-cursor { animation: al-blink 1s step-end infinite; }
  </style>

  <defs>
    <linearGradient id="al-bgGrad" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FAFAFC"/>
      <stop offset="0.5" stop-color="#F1EEFB"/>
      <stop offset="1" stop-color="#FAFAFC"/>
    </linearGradient>
    <linearGradient id="al-textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0091AD">
        <animate attributeName="offset" values="0;0.3;0" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#6E3FD6"/>
      <stop offset="1" stop-color="#9A0EC2">
        <animate attributeName="offset" values="1;0.7;1" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="al-neonGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0091AD"/>
      <stop offset="1" stop-color="#9A0EC2"/>
    </linearGradient>
    <filter id="al-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="al-clipTerm1"><rect x="0" y="0" width="0" height="20"><animate attributeName="width" values="0;430;430" keyTimes="0;0.6;1" dur="3s" begin="0.3s" fill="freeze"/></rect></clipPath>
    <clipPath id="al-clipCode1"><rect x="0" y="0" width="0" height="20"><animate attributeName="width" values="0;360;360" keyTimes="0;0.6;1" dur="2.4s" begin="2.4s" fill="freeze"/></rect></clipPath>
    <clipPath id="al-clipCode2"><rect x="0" y="0" width="0" height="20"><animate attributeName="width" values="0;300;300" keyTimes="0;0.6;1" dur="2.2s" begin="4.6s" fill="freeze"/></rect></clipPath>
    <clipPath id="al-clipCode3"><rect x="0" y="0" width="0" height="20"><animate attributeName="width" values="0;250;250" keyTimes="0;0.6;1" dur="2s" begin="6.6s" fill="freeze"/></rect></clipPath>
  </defs>

  <rect width="1200" height="320" fill="url(#al-bgGrad)"/>

  <g>
    <circle class="al-p" cx="90" cy="290" r="1.6" fill="#0091AD" style="animation-duration:7s;"/>
    <circle class="al-p" cx="180" cy="300" r="1.2" fill="#9A0EC2" style="animation-duration:9s; animation-delay:1s;"/>
    <circle class="al-p" cx="330" cy="310" r="1.8" fill="#0091AD" style="animation-duration:6.5s; animation-delay:2s;"/>
    <circle class="al-p" cx="960" cy="300" r="1.4" fill="#9A0EC2" style="animation-duration:6.8s; animation-delay:1.4s;"/>
    <circle class="al-p" cx="1080" cy="308" r="1.7" fill="#0091AD" style="animation-duration:9.2s; animation-delay:2.2s;"/>
  </g>

  <rect x="60" y="34" width="520" height="176" rx="14" class="al-card"/>
  <rect x="60" y="34" width="520" height="30" rx="14" fill="rgba(5,5,10,0.035)"/>
  <circle cx="82" cy="49" r="5" fill="#FF5F57"/>
  <circle cx="100" cy="49" r="5" fill="#FEBC2E"/>
  <circle cx="118" cy="49" r="5" fill="#28C840"/>
  <text x="330" y="53" text-anchor="middle" class="al-mono al-dim" font-size="11">dev-asik — zsh</text>

  <text x="82" y="92" class="al-mono al-bright" font-size="14">
    <tspan fill="#0091AD">user</tspan><tspan fill="#6B6B76">@</tspan><tspan fill="#9A0EC2">dev-asik</tspan><tspan fill="#6B6B76">:~$</tspan>
    <tspan clip-path="url(#al-clipTerm1)"> cat README.md</tspan>
  </text>
  <rect x="252" y="80" width="8" height="14" fill="#0091AD" class="al-cursor" style="animation-delay:.3s;"/>

  <g class="al-disp" font-size="34" fill="url(#al-textGrad)">
    <text x="82" y="140">
      <tspan opacity="0">A<animate attributeName="opacity" to="1" begin="3.3s" dur=".25s" fill="freeze"/></tspan><tspan opacity="0">s<animate attributeName="opacity" to="1" begin="3.42s" dur=".25s" fill="freeze"/></tspan><tspan opacity="0">i<animate attributeName="opacity" to="1" begin="3.54s" dur=".25s" fill="freeze"/></tspan><tspan opacity="0">k<animate attributeName="opacity" to="1" begin="3.66s" dur=".25s" fill="freeze"/></tspan><tspan opacity="0"> <animate attributeName="opacity" to="1" begin="3.78s" dur=".25s" fill="freeze"/></tspan><tspan opacity="0">I<animate attributeName="opacity" to="1" begin="3.9s" dur=".25s" fill="freeze"/></tspan><tspan opacity="0">k<animate attributeName="opacity" to="1" begin="4.02s" dur=".25s" fill="freeze"/></tspan><tspan opacity="0">b<animate attributeName="opacity" to="1" begin="4.14s" dur=".25s" fill="freeze"/></tspan><tspan opacity="0">a<animate attributeName="opacity" to="1" begin="4.26s" dur=".25s" fill="freeze"/></tspan><tspan opacity="0">l<animate attributeName="opacity" to="1" begin="4.38s" dur=".25s" fill="freeze"/></tspan>
    </text>
  </g>

  <g class="al-mono" font-size="15">
    <text x="83" y="168" fill="#6E3FD6" opacity="0">Full Stack Developer
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.02;0.08;0.28;0.32;1" dur="9s" begin="4.8s" repeatCount="indefinite"/>
    </text>
    <text x="83" y="168" fill="#6E3FD6" opacity="0">AI Developer
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.35;0.38;0.61;0.64;1" dur="9s" begin="4.8s" repeatCount="indefinite"/>
    </text>
    <text x="83" y="168" fill="#6E3FD6" opacity="0">UI / UX Designer
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.67;0.7;0.97;0.99;1" dur="9s" begin="4.8s" repeatCount="indefinite"/>
    </text>
  </g>

  <text x="83" y="195" class="al-mono al-dim" font-size="12">Murshidabad, West Bengal · India</text>

  <rect x="612" y="34" width="528" height="176" rx="14" class="al-card"/>
  <rect x="612" y="34" width="528" height="30" rx="14" fill="rgba(5,5,10,0.035)"/>
  <text x="632" y="53" class="al-mono al-dim" font-size="11">dev-asik.ts</text>

  <text x="632" y="92" class="al-mono" font-size="13.5">
    <tspan fill="#9A0EC2">const</tspan><tspan fill="#101014"> dev</tspan><tspan fill="#6B6B76"> = {</tspan>
    <tspan clip-path="url(#al-clipCode1)"> </tspan>
  </text>
  <text x="652" y="114" class="al-mono" font-size="13.5" clip-path="url(#al-clipCode1)">
    <tspan fill="#0091AD">name</tspan><tspan fill="#6B6B76">: </tspan><tspan fill="#1B8A4A">'Asik Ikbal'</tspan><tspan fill="#6B6B76">,</tspan>
  </text>
  <text x="652" y="136" class="al-mono" font-size="13.5" clip-path="url(#al-clipCode2)">
    <tspan fill="#0091AD">role</tspan><tspan fill="#6B6B76">: </tspan><tspan fill="#1B8A4A">'Full Stack · AI Dev'</tspan><tspan fill="#6B6B76">,</tspan>
  </text>
  <text x="652" y="158" class="al-mono" font-size="13.5" clip-path="url(#al-clipCode3)">
    <tspan fill="#0091AD">stack</tspan><tspan fill="#6B6B76">: [</tspan><tspan fill="#1B8A4A">'React','Next','AI'</tspan><tspan fill="#6B6B76">]</tspan>
  </text>
  <text x="632" y="180" class="al-mono" font-size="13.5" opacity="0" fill="#6B6B76">{`}`}<animate attributeName="opacity" to="1" begin="6.9s" dur=".3s" fill="freeze"/></text>
  <rect x="700" y="169" width="7" height="13" fill="#9A0EC2" class="al-cursor" style="animation-delay:6.9s;"/>

  <g text-anchor="middle" filter="url(#al-glow)">
    <text x="600" y="270" class="al-disp al-neon" font-size="30" fill="url(#al-neonGrad)" letter-spacing="6">BUILD • LEARN • SHIP</text>
  </g>

  <text x="1140" y="308" text-anchor="end" class="al-mono al-dim" font-size="10" opacity="0.7">dev-asik ✦ github.com/UnfavAsik</text>
</svg>
