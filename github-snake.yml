name: Generate Snake Animation

on:
  schedule:
    # Runs every day at 00:00 UTC — update the contribution snake daily
    - cron: "0 0 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=%2300D9FF&color_dots=%23161b22,%230e4429,%23006d32,%2326a641,%2300D9FF
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%23C026FF
            dist/github-snake.gif?color_snake=%2300D9FF

      - name: Push snake artifacts to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
