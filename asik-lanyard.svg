<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lanyardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D9FF"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#C026FF"/>
    </linearGradient>

    <linearGradient id="holoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,217,255,0)"/>
      <stop offset="40%" stop-color="rgba(0,217,255,0.1)"/>
      <stop offset="50%" stop-color="rgba(192,38,255,0.3)"/>
      <stop offset="60%" stop-color="rgba(0,217,255,0.1)"/>
      <stop offset="100%" stop-color="rgba(192,38,255,0)"/>
      <animate attributeName="x1" values="0%;200%;0%" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;300%;100%" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="lanyardGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="avatarClip">
      <circle cx="200" cy="220" r="55"/>
    </clipPath>

    <pattern id="barcodePattern" x="0" y="0" width="4" height="30" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1.5" height="30" fill="#fff"/>
      <rect x="2.5" y="0" width="0.5" height="30" fill="#fff"/>
    </pattern>
  </defs>

  <g>
    <animateTransform attributeName="transform" type="rotate" values="-2 200 0; 2 200 0; -2 200 0" dur="4s" repeatCount="indefinite"/>

    <path d="M 160 0 Q 160 80 180 100 L 220 100 Q 240 80 240 0" fill="none" stroke="url(#lanyardGrad)" stroke-width="12" filter="url(#lanyardGlow)"/>
    <path d="M 160 0 Q 160 80 180 100 L 220 100 Q 240 80 240 0" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

    <rect x="185" y="95" width="30" height="20" rx="4" fill="#444" stroke="#666" stroke-width="1"/>
    <rect x="190" y="100" width="20" height="10" rx="2" fill="#555"/>

    <rect x="50" y="115" width="300" height="420" rx="20" fill="rgba(10,10,20,0.95)" stroke="url(#lanyardGrad)" stroke-width="2" filter="url(#lanyardGlow)"/>
    <rect x="50" y="115" width="300" height="420" rx="20" fill="url(#holoGrad)" opacity="0.6"/>

    <rect x="50" y="115" width="300" height="80" rx="20" fill="url(#lanyardGrad)" opacity="0.15"/>
    <rect x="50" y="155" width="300" height="40" fill="url(#lanyardGrad)" opacity="0.1"/>

    <text x="200" y="155" font-family="sans-serif" font-size="20" font-weight="800" fill="url(#lanyardGrad)" text-anchor="middle" filter="url(#lanyardGlow)">DEV ASIK</text>
    <text x="200" y="175" font-family="monospace" font-size="10" fill="#888" text-anchor="middle" letter-spacing="4">DEVELOPER ID</text>

    <circle cx="200" cy="260" r="58" fill="none" stroke="url(#lanyardGrad)" stroke-width="3" filter="url(#lanyardGlow)">
      <animate attributeName="stroke-dasharray" values="0 365; 365 365" dur="2s" begin="0.5s" fill="freeze"/>
    </circle>

    <circle cx="200" cy="260" r="55" fill="#1a1a2e"/>
    <text x="200" y="265" font-family="sans-serif" font-size="28" font-weight="700" fill="url(#lanyardGrad)" text-anchor="middle">AI</text>

    <circle cx="250" cy="305" r="8" fill="#00D9FF" filter="url(#lanyardGlow)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>

    <text x="200" y="355" font-family="sans-serif" font-size="22" font-weight="700" fill="#fff" text-anchor="middle">Asik Ikbal</text>
    <text x="200" y="380" font-family="monospace" font-size="11" fill="#00D9FF" text-anchor="middle">Full Stack Developer</text>

    <line x1="80" y1="400" x2="320" y2="400" stroke="url(#lanyardGrad)" stroke-width="1" opacity="0.3"/>

    <text x="80" y="430" font-family="monospace" font-size="10" fill="#666">GITHUB</text>
    <text x="80" y="448" font-family="monospace" font-size="12" fill="#fff">@UnfavAsik</text>

    <text x="80" y="478" font-family="monospace" font-size="10" fill="#666">LOCATION</text>
    <text x="80" y="496" font-family="monospace" font-size="12" fill="#fff">West Bengal, India</text>

    <g transform="translate(240, 420)">
      <rect x="0" y="0" width="60" height="30" fill="url(#barcodePattern)" opacity="0.8"/>
      <rect x="0" y="0" width="60" height="30" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
      <text x="30" y="42" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">8824-0912</text>
    </g>

    <path d="M 50 135 L 70 115" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
    <path d="M 350 135 L 330 115" stroke="#C026FF" stroke-width="2" opacity="0.5"/>
    <path d="M 50 515 L 70 535" stroke="#C026FF" stroke-width="2" opacity="0.5"/>
    <path d="M 350 515 L 330 535" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
  </g>
</svg>