<svg width="380" height="560" viewBox="0 0 380 560" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Dev Asik swinging ID badge">
<defs>
  <clipPath id="avatarClip"><circle cx="0" cy="0" r="46"/></clipPath>
  <clipPath id="cardClip"><rect x="-100" y="-10" width="200" height="270" rx="20"/></clipPath>

  <linearGradient id="strapGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#C026FF"/>
    <stop offset="100%" stop-color="#00D9FF"/>
  </linearGradient>
  <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0d0d14"/>
    <stop offset="100%" stop-color="#111118"/>
  </linearGradient>
  <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
    <stop offset="45%" stop-color="#ffffff" stop-opacity="0.35"/>
    <stop offset="55%" stop-color="#ffffff" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00D9FF"/>
    <stop offset="100%" stop-color="#C026FF"/>
  </linearGradient>

  <filter id="badgeGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <style>
    .mono { font-family:'JetBrains Mono','Fira Code',Consolas,monospace; }
    .sans { font-family:'Space Grotesk','Segoe UI',Inter,sans-serif; }

    @keyframes swing {
      0% { transform: rotate(-7deg); }
      50% { transform: rotate(7deg); }
      100% { transform: rotate(-7deg); }
    }
    #rig {
      transform-origin: 190px 40px;
      animation: dropIn 1.1s cubic-bezier(.2,1.6,.4,1) 1, swing 4.5s ease-in-out 1.1s infinite;
    }
    @keyframes dropIn {
      0% { transform: translateY(-260px) rotate(0deg); opacity:0; }
      60% { transform: translateY(10px) rotate(-9deg); opacity:1; }
      80% { transform: translateY(-4px) rotate(6deg); }
      100% { transform: translateY(0px) rotate(-7deg); }
    }

    @keyframes shineSweep {
      0% { transform: translate(-260px,-260px); }
      60%,100% { transform: translate(260px,260px); }
    }
    .shine { animation: shineSweep 3.5s ease-in-out infinite; }

    @keyframes ringSpin { to { transform: rotate(360deg); } }
    .ringSpin { transform-origin: 0px 0px; animation: ringSpin 6s linear infinite; }
  </style>
</defs>

<rect width="380" height="560" fill="none"/>

<g id="rig">
  <!-- strap -->
  <path d="M 160 -40 Q 190 90 190 150" stroke="url(#strapGrad)" stroke-width="26" fill="none" stroke-linecap="round"/>
  <path d="M 160 -40 Q 190 90 190 150" stroke="#000000" stroke-opacity="0.15" stroke-width="26" fill="none" stroke-linecap="round" stroke-dasharray="1 11"/>
  <text class="mono" x="190" y="20" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700" transform="rotate(6 190 20)" opacity="0.85"></text>
  <text class="mono" x="190" y="70" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700" opacity="0.85"></text>

  <!-- clasp -->
  <circle cx="190" cy="150" r="10" fill="#cfd3da"/>
  <circle cx="190" cy="150" r="5" fill="#8a8f99"/>
  <rect x="184" y="155" width="12" height="16" rx="4" fill="#cfd3da"/>
  <circle cx="190" cy="176" r="8" fill="none" stroke="#cfd3da" stroke-width="4"/>

  <!-- card -->
  <g transform="translate(190,258)" filter="url(#badgeGlow)">
    <rect x="-100" y="-10" width="200" height="270" rx="20" fill="url(#cardGrad)" stroke="#00D9FF" stroke-opacity="0.35"/>
    <g clip-path="url(#cardClip)">
      <rect x="-100" y="-10" width="200" height="46" fill="#080809"/>
      <text class="sans" x="0" y="14" text-anchor="middle" fill="#00D9FF" font-size="13" font-weight="700" letter-spacing="1">DEV ASIK</text>

      <circle cx="0" cy="80" r="50" fill="url(#ringGrad)" class="ringSpin" style="transform-origin:0px 80px;" opacity="0.9"/>
      <circle cx="0" cy="80" r="46" fill="#0d0d14"/>
      <g transform="translate(0,80)" clip-path="url(#avatarClip)">
        <image href="data:image/jpeg;base64," x="-46" y="-46" width="92" height="92" preserveAspectRatio="xMidYMid slice"/>
      </g>

      <text class="sans" x="0" y="150" text-anchor="middle" fill="#f2f2f5" font-size="17" font-weight="700">Asik Ikbal</text>
      <text class="mono" x="0" y="170" text-anchor="middle" fill="#C026FF" font-size="11">Full Stack • AI • UI/UX</text>
      <text class="mono" x="0" y="188" text-anchor="middle" fill="#7a7a86" font-size="10.5">@UnfavAsik</text>

      <line x1="-80" y1="205" x2="80" y2="205" stroke="#22222b"/>
      <g transform="translate(-80,214)">
        <rect x="0.0" y="0" width="2.4" height="26" fill="#d8d8de"/><rect x="3.1" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="6.2" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="9.3" y="0" width="2.4" height="26" fill="#d8d8de"/><rect x="12.4" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="15.5" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="18.6" y="0" width="2.4" height="26" fill="#d8d8de"/><rect x="21.7" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="24.8" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="27.900000000000002" y="0" width="2.4" height="26" fill="#d8d8de"/><rect x="31.0" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="34.1" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="37.2" y="0" width="2.4" height="26" fill="#d8d8de"/><rect x="40.300000000000004" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="43.4" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="46.5" y="0" width="2.4" height="26" fill="#d8d8de"/><rect x="49.6" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="52.7" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="55.800000000000004" y="0" width="2.4" height="26" fill="#d8d8de"/><rect x="58.9" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="62.0" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="65.10000000000001" y="0" width="2.4" height="26" fill="#d8d8de"/><rect x="68.2" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="71.3" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="74.4" y="0" width="2.4" height="26" fill="#d8d8de"/><rect x="77.5" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="80.60000000000001" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="83.7" y="0" width="2.4" height="26" fill="#d8d8de"/><rect x="86.8" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="89.9" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="93.0" y="0" width="2.4" height="26" fill="#d8d8de"/><rect x="96.10000000000001" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="99.2" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="102.3" y="0" width="2.4" height="26" fill="#d8d8de"/><rect x="105.4" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="108.5" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="111.60000000000001" y="0" width="2.4" height="26" fill="#d8d8de"/><rect x="114.7" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="117.8" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="120.9" y="0" width="2.4" height="26" fill="#d8d8de"/><rect x="124.0" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="127.10000000000001" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="130.20000000000002" y="0" width="2.4" height="26" fill="#d8d8de"/><rect x="133.3" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="136.4" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="139.5" y="0" width="2.4" height="26" fill="#d8d8de"/><rect x="142.6" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="145.70000000000002" y="0" width="1.6" height="26" fill="#d8d8de"/><rect x="148.8" y="0" width="2.4" height="26" fill="#d8d8de"/><rect x="151.9" y="0" width="1.6" height="26" fill="#d8d8de"/>
      </g>
      <text class="mono" x="0" y="252" text-anchor="middle" fill="#5c5c66" font-size="9" letter-spacing="3">ID • 2026 • MSD-IN</text>

      <rect x="-100" y="-10" width="200" height="270" fill="url(#shineGrad)" class="shine"/>
    </g>
    <rect x="-100" y="-10" width="200" height="270" rx="20" fill="none" stroke="#00D9FF" stroke-opacity="0.25"/>
  </g>
</g>
</svg>
