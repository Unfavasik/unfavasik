<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .ab-mono { font-family: 'SF Mono','Fira Code','Consolas',monospace; }
    .ab-disp { font-family: 'Segoe UI','Helvetica Neue',Arial,sans-serif; font-weight: 800; }
    .ab-card { fill: rgba(255,255,255,0.035); stroke: rgba(255,255,255,0.09); stroke-width:1; }
    .ab-dim { fill:#7A7A85; }
    .ab-bright { fill:#E7E7EC; }
    @keyframes ab-float { 0% { transform: translateY(0px); opacity:.15;} 50% { opacity:.55;} 100% { transform: translateY(-260px); opacity:0;} }
    @keyframes ab-flicker { 0%,19%,21%,23%,54%,56%,100% { opacity:1;} 20%,22%,55% { opacity:.35;} }
    @keyframes ab-blink { 0%,49% {opacity:1;} 50%,100% {opacity:0;} }
    @keyframes ab-shine { 0% { transform: translateX(-140%) skewX(-20deg);} 100% { transform: translateX(240%) skewX(-20deg);} }
    .ab-p { animation: ab-float linear infinite; }
    .ab-neon { animation: ab-flicker 5s infinite; }
    .ab-cursor { animation: ab-blink 1s step-end infinite; }
    .ab-shine-el { animation: ab-shine 4.5s ease-in-out infinite; }
  </style>

  <defs>
    <linearGradient id="ab-bgGrad" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="0.5" stop-color="#0a0510"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="ab-textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00D9FF">
        <animate attributeName="offset" values="0;0.3;0" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#7B5CFF"/>
      <stop offset="1" stop-color="#C026FF">
        <animate attributeName="offset" values="1;0.7;1" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="ab-neonGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00D9FF"/>
      <stop offset="1" stop-color="#C026FF"/>
    </linearGradient>
    <filter id="ab-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ab-softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <clipPath id="ab-clipTerm1"><rect x="0" y="0" width="0" height="20"><animate attributeName="width" values="0;430;430" keyTimes="0;0.6;1" dur="3s" begin="0.3s" fill="freeze"/></rect></clipPath>
    <clipPath id="ab-clipCode1"><rect x="0" y="0" width="0" height="20"><animate attributeName="width" values="0;360;360" keyTimes="0;0.6;1" dur="2.4s" begin="2.4s" fill="freeze"/></rect></clipPath>
    <clipPath id="ab-clipCode2"><rect x="0" y="0" width="0" height="20"><animate attributeName="width" values="0;300;300" keyTimes="0;0.6;1" dur="2.2s" begin="4.6s" fill="freeze"/></rect></clipPath>
    <clipPath id="ab-clipCode3"><rect x="0" y="0" width="0" height="20"><animate attributeName="width" values="0;250;250" keyTimes="0;0.6;1" dur="2s" begin="6.6s" fill="freeze"/></rect></clipPath>
    <radialGradient id="ab-vign" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#0d0518" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#ab-bgGrad)"/>
  <rect width="1200" height="320" fill="url(#ab-vign)"/>

  <!-- floating particles -->
  <g>
    <circle class="ab-p" cx="90" cy="290" r="1.6" fill="#00D9FF" style="animation-duration:7s; animation-delay:0s;"/>
    <circle class="ab-p" cx="180" cy="300" r="1.2" fill="#C026FF" style="animation-duration:9s; animation-delay:1s;"/>
    <circle class="ab-p" cx="330" cy="310" r="1.8" fill="#00D9FF" style="animation-duration:6.5s; animation-delay:2s;"/>
    <circle class="ab-p" cx="620" cy="300" r="1.3" fill="#C026FF" style="animation-duration:8s; animation-delay:.5s;"/>
    <circle class="ab-p" cx="760" cy="310" r="1.5" fill="#00D9FF" style="animation-duration:7.5s; animation-delay:3s;"/>
    <circle class="ab-p" cx="960" cy="300" r="1.4" fill="#C026FF" style="animation-duration:6.8s; animation-delay:1.4s;"/>
    <circle class="ab-p" cx="1080" cy="308" r="1.7" fill="#00D9FF" style="animation-duration:9.2s; animation-delay:2.2s;"/>
    <circle class="ab-p" cx="1150" cy="298" r="1.2" fill="#C026FF" style="animation-duration:7.2s; animation-delay:.8s;"/>
  </g>

  <!-- Terminal Card -->
  <rect x="60" y="34" width="520" height="176" rx="14" class="ab-card"/>
  <rect x="60" y="34" width="520" height="30" rx="14" fill="rgba(255,255,255,0.04)"/>
  <circle cx="82" cy="49" r="5" fill="#FF5F57"/>
  <circle cx="100" cy="49" r="5" fill="#FEBC2E"/>
  <circle cx="118" cy="49" r="5" fill="#28C840"/>
  <text x="330" y="53" text-anchor="middle" class="ab-mono ab-dim" font-size="11">dev-asik — zsh</text>

  <text x="82" y="92" class="ab-mono ab-bright" font-size="14">
    <tspan fill="#00D9FF">user</tspan><tspan fill="#7A7A85">@</tspan><tspan fill="#C026FF">dev-asik</tspan><tspan fill="#7A7A85">:~$</tspan>
    <tspan clip-path="url(#ab-clipTerm1)"> cat README.md</tspan>
  </text>
  <rect x="252" y="80" width="8" height="14" fill="#00D9FF" class="ab-cursor" style="animation-delay:.3s;"/>

  <!-- Name letter by letter -->
  <g class="ab-disp" font-size="34" fill="url(#ab-textGrad)">
    <text x="82" y="140">
      <tspan opacity="0">A<animate attributeName="opacity" to="1" begin="3.3s" dur=".25s" fill="freeze"/></tspan><tspan opacity="0">s<animate attributeName="opacity" to="1" begin="3.42s" dur=".25s" fill="freeze"/></tspan><tspan opacity="0">i<animate attributeName="opacity" to="1" begin="3.54s" dur=".25s" fill="freeze"/></tspan><tspan opacity="0">k<animate attributeName="opacity" to="1" begin="3.66s" dur=".25s" fill="freeze"/></tspan><tspan opacity="0"> <animate attributeName="opacity" to="1" begin="3.78s" dur=".25s" fill="freeze"/></tspan><tspan opacity="0">I<animate attributeName="opacity" to="1" begin="3.9s" dur=".25s" fill="freeze"/></tspan><tspan opacity="0">k<animate attributeName="opacity" to="1" begin="4.02s" dur=".25s" fill="freeze"/></tspan><tspan opacity="0">b<animate attributeName="opacity" to="1" begin="4.14s" dur=".25s" fill="freeze"/></tspan><tspan opacity="0">a<animate attributeName="opacity" to="1" begin="4.26s" dur=".25s" fill="freeze"/></tspan><tspan opacity="0">l<animate attributeName="opacity" to="1" begin="4.38s" dur=".25s" fill="freeze"/></tspan>
    </text>
  </g>

  <!-- rotating roles -->
  <g class="ab-mono" font-size="15">
    <text x="83" y="168" fill="#00D9FF" opacity="0">Full Stack Developer
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.02;0.08;0.28;0.32;1" dur="9s" begin="4.8s" repeatCount="indefinite"/>
    </text>
    <text x="83" y="168" fill="#00D9FF" opacity="0">AI Developer
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.35;0.38;0.61;0.64;1" dur="9s" begin="4.8s" repeatCount="indefinite"/>
    </text>
    <text x="83" y="168" fill="#00D9FF" opacity="0">UI / UX Designer
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.67;0.7;0.97;0.99;1" dur="9s" begin="4.8s" repeatCount="indefinite"/>
    </text>
  </g>

  <text x="83" y="195" class="ab-mono ab-dim" font-size="12">Murshidabad, West Bengal · India</text>

  <!-- Code editor card -->
  <rect x="612" y="34" width="528" height="176" rx="14" class="ab-card"/>
  <rect x="612" y="34" width="528" height="30" rx="14" fill="rgba(255,255,255,0.04)"/>
  <text x="632" y="53" class="ab-mono ab-dim" font-size="11">dev-asik.ts</text>

  <text x="632" y="92" class="ab-mono" font-size="13.5">
    <tspan fill="#C026FF">const</tspan><tspan fill="#E7E7EC"> dev</tspan><tspan fill="#7A7A85"> = {</tspan>
    <tspan clip-path="url(#ab-clipCode1)"> </tspan>
  </text>
  <text x="652" y="114" class="ab-mono" font-size="13.5" clip-path="url(#ab-clipCode1)">
    <tspan fill="#00D9FF">name</tspan><tspan fill="#7A7A85">: </tspan><tspan fill="#8CFFAE">'Asik Ikbal'</tspan><tspan fill="#7A7A85">,</tspan>
  </text>
  <text x="652" y="136" class="ab-mono" font-size="13.5" clip-path="url(#ab-clipCode2)">
    <tspan fill="#00D9FF">role</tspan><tspan fill="#7A7A85">: </tspan><tspan fill="#8CFFAE">'Full Stack · AI Dev'</tspan><tspan fill="#7A7A85">,</tspan>
  </text>
  <text x="652" y="158" class="ab-mono" font-size="13.5" clip-path="url(#ab-clipCode3)">
    <tspan fill="#00D9FF">stack</tspan><tspan fill="#7A7A85">: [</tspan><tspan fill="#8CFFAE">'React','Next','AI'</tspan><tspan fill="#7A7A85">]</tspan>
  </text>
  <text x="632" y="180" class="ab-mono" font-size="13.5" opacity="0" fill="#7A7A85">{`}`}<animate attributeName="opacity" to="1" begin="6.9s" dur=".3s" fill="freeze"/></text>
  <rect x="700" y="169" width="7" height="13" fill="#C026FF" class="ab-cursor" style="animation-delay:6.9s;"/>

  <!-- Neon sign -->
  <g text-anchor="middle" filter="url(#ab-glow)">
    <text x="600" y="270" class="ab-disp ab-neon" font-size="30" fill="url(#ab-neonGrad)" letter-spacing="6">BUILD • LEARN • SHIP</text>
  </g>
  <ellipse cx="600" cy="278" rx="260" ry="14" fill="url(#ab-neonGrad)" opacity="0.12" filter="url(#ab-softglow)"/>

  <!-- shine sweep -->
  <g clip-path="url(#ab-fullclip)">
    <rect x="0" y="0" width="1200" height="320" fill="none"/>
  </g>
  <rect class="ab-shine-el" x="-200" y="0" width="120" height="320" fill="white" opacity="0.02"/>

  <text x="1140" y="308" text-anchor="end" class="ab-mono ab-dim" font-size="10" opacity="0.6">dev-asik ✦ github.com/UnfavAsik</text>
</svg>
