<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="50%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>

    <linearGradient id="cyanPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D9FF"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#C026FF"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D9FF"/>
      <stop offset="50%" stop-color="#C026FF"/>
      <stop offset="100%" stop-color="#00D9FF"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C026FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#C026FF" stop-opacity="0"/>
    </radialGradient>

    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00D9FF" stroke-width="0.3" opacity="0.1"/>
    </pattern>

    <clipPath id="termClip">
      <rect x="80" y="120" width="1040" height="280" rx="16"/>
    </clipPath>
  </defs>

  <rect width="1200" height="500" fill="url(#bgGrad)"/>
  <rect width="1200" height="500" fill="url(#grid)"/>

  <g opacity="0.4">
    <circle cx="100" cy="50" r="1.5" fill="#00D9FF">
      <animate attributeName="cy" values="50;450;50" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="80" r="1" fill="#C026FF">
      <animate attributeName="cy" values="80;420;80" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="30" r="2" fill="#00D9FF">
      <animate attributeName="cy" values="30;470;30" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="60" r="1.2" fill="#C026FF">
      <animate attributeName="cy" values="60;440;60" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="40" r="1.8" fill="#00D9FF">
      <animate attributeName="cy" values="40;460;40" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="70" r="1" fill="#C026FF">
      <animate attributeName="cy" values="70;430;70" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="13s" repeatCount="indefinite"/>
    </circle>
  </g>

  <circle cx="200" cy="250" r="150" fill="url(#glow1)" opacity="0.5">
    <animate attributeName="r" values="150;170;150" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="250" r="120" fill="url(#glow2)" opacity="0.5">
    <animate attributeName="r" values="120;140;120" dur="5s" repeatCount="indefinite"/>
  </circle>

  <g>
    <rect x="82" y="124" width="1040" height="280" rx="16" fill="#000" opacity="0.3"/>
    <rect x="80" y="120" width="1040" height="280" rx="16" fill="rgba(10,10,20,0.85)" stroke="rgba(0,217,255,0.2)" stroke-width="1"/>
    <rect x="80" y="120" width="1040" height="36" rx="16" fill="rgba(0,217,255,0.05)"/>
    <rect x="80" y="140" width="1040" height="16" fill="rgba(0,217,255,0.05)"/>
    <circle cx="108" cy="138" r="6" fill="#FF5F56"/>
    <circle cx="130" cy="138" r="6" fill="#FFBD2E"/>
    <circle cx="152" cy="138" r="6" fill="#27C93F"/>
    <text x="600" y="143" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">dev-asik — zsh</text>
  </g>

  <g clip-path="url(#termClip)">
    <text x="100" y="180" font-family="monospace" font-size="14" fill="#00D9FF" opacity="0">
      <tspan>user@dev-asik:~$ </tspan><tspan fill="#C026FF">cat README.md</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.5s" fill="freeze"/>
    </text>

    <g opacity="0">
      <rect x="100" y="192" width="0" height="4" rx="2" fill="url(#cyanPurple)">
        <animate attributeName="width" values="0;300" dur="1.5s" begin="1s" fill="freeze"/>
      </rect>
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1s" fill="freeze"/>
    </g>

    <text x="100" y="230" font-family="sans-serif" font-size="42" font-weight="800" fill="url(#textGrad)" opacity="0">
      ASIK IKBAL
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="2.5s" fill="freeze"/>
    </text>

    <text x="100" y="260" font-family="monospace" font-size="14" fill="#00D9FF" opacity="0">
      <tspan fill="#888">// </tspan>Brand: <tspan fill="#C026FF" font-weight="600">Dev Asik</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="3.5s" fill="freeze"/>
    </text>

    <text x="100" y="290" font-family="monospace" font-size="16" fill="#fff" opacity="0">
      <tspan fill="#00D9FF">&gt;</tspan> 
      <tspan>
        <animate attributeName="opacity" values="1;0;1" dur="0.2s" begin="4.5s;7.5s;10.5s;13.5s"/>
        Full Stack Developer
      </tspan>
      <tspan x="116" dy="0" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="0.2s" begin="5.5s"/>
        AI Developer
      </tspan>
      <tspan x="116" dy="0" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="0.2s" begin="8.5s"/>
        UI/UX Designer
      </tspan>
      <tspan x="116" dy="0" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="0.2s" begin="11.5s"/>
        Full Stack Developer
      </tspan>
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="4.5s" fill="freeze"/>
    </text>

    <g opacity="0">
      <text x="100" y="320" font-family="monospace" font-size="12" fill="#888">
        <tspan fill="#C026FF">const</tspan> <tspan fill="#00D9FF">dev</tspan> = {
      </text>
      <text x="120" y="338" font-family="monospace" font-size="12" fill="#888">
        <tspan fill="#fff">name</tspan>: <tspan fill="#27C93F">"Asik Ikbal"</tspan>,
      </text>
      <text x="120" y="356" font-family="monospace" font-size="12" fill="#888">
        <tspan fill="#fff">passion</tspan>: <tspan fill="#27C93F">"Building the future"</tspan>,
      </text>
      <text x="120" y="374" font-family="monospace" font-size="12" fill="#888">
        <tspan fill="#fff">status</tspan>: <tspan fill="#FFBD2E">"Shipping code daily"</tspan>
      </text>
      <text x="100" y="392" font-family="monospace" font-size="12" fill="#888">};</text>
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="5s" fill="freeze"/>
    </g>

    <rect x="100" y="410" width="10" height="18" fill="#00D9FF" opacity="0">
      <animate attributeName="opacity" values="1;0;1" dur="1s" begin="6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g transform="translate(800, 200)">
    <rect x="-120" y="-30" width="240" height="50" rx="8" fill="none" stroke="url(#cyanPurple)" stroke-width="2" filter="url(#neon)" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="0" y="0" font-family="sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle" filter="url(#neon)">
      BUILD • LEARN • SHIP
      <animate attributeName="fill" values="#00D9FF;#C026FF;#00D9FF" dur="4s" repeatCount="indefinite"/>
    </text>
  </g>

  <line x1="80" y1="120" x2="1120" y2="120" stroke="#00D9FF" stroke-width="2" opacity="0.6" filter="url(#neon)">
    <animate attributeName="y1" values="120;400;120" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="120;400;120" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="4s" repeatCount="indefinite"/>
  </line>

  <rect x="80" y="398" width="1040" height="2" fill="url(#cyanPurple)" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>